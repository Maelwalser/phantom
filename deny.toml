# cargo-deny configuration (v0.19+)
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# rsa 0.9.x is reachable only through sqlx-mysql, which is pulled in by
# sqlx's macro crate even when only the sqlite backend is enabled. Phantom
# never runs MySQL queries, so the Marvin timing sidechannel is not
# exploitable in our binary.
ignore = ["RUSTSEC-2023-0071"]

[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
]

[bans]
multiple-versions = "warn"
# Workspace path dependencies use wildcard versions internally — allow them.
wildcards = "allow"
workspace-default-features = "allow"
external-default-features = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
